[General]
network = TDMANetwork
sim-time-limit = 3000s  # 仿真时长（3000s ≈ 11000 帧，update_every=128 可完成 ~86 次 PPO 更新）
record-eventlog = true # 记录事件日志，便于在IDE中查看波形

# ------------------------------------------------------------------
# 场景参数配置
# ------------------------------------------------------------------

# 节点总数 (N) - 对应文档中的20个节点
*.numNodes = 9

# 业务时隙数量 (M) - 假设每个帧有10个传输时隙
*.numDataSlots = 10


# 单个时隙长度 - 假设10ms
*.slotDuration = 10ms

# ------------------------------------------------------------------
# 节点独立配置 (自动分配ID)
# ------------------------------------------------------------------
# 将 NED 中的索引 i 赋值给 myId 参数
# nodes[0].myId = 0, nodes[1].myId = 1, ...
**.nodes[*].myId = index
**.nodes[*].numNodes = 9
**.nodes[*].numDataSlots = 10

# ------------------------------------------------------------------
# 随机数种子 (用于复现)
# ------------------------------------------------------------------
seed-set = 1
**.nodes[*].uniform.rng-0 = 1

# ------------------------------------------------------------------
# 流量生成配置 (QoS / 拥塞控制测试)
# ------------------------------------------------------------------
**.nodes[*].trafficArrivalRate = 5.0  # 基础到达率（动态控制起点）
**.nodes[*].usePoissonTraffic = true
**.nodes[*].enableAdaptiveTraffic = false
**.nodes[*].enableRampTraffic = false
**.nodes[*].rampRateStart = 5.0
**.nodes[*].rampRateStep = 5.0
**.nodes[*].rampRateMax = 60.0
**.nodes[*].rampHoldFrames = 3
**.nodes[*].trafficRateMin = 5.0
**.nodes[*].trafficRateMax = 60.0
**.nodes[*].trafficRateStep = 2.0
**.nodes[*].queueHighWatermark = 20
**.nodes[*].queueLowWatermark = 5
**.nodes[*].collisionHighWatermark = 3
**.nodes[*].highLoadThreshold = 10
**.nodes[*].highLoadProbBoost = 0.3

# ------------------------------------------------------------------
# RL 同步配置
# rlSyncInterval = 0  : 异步模式（原有行为，Python 未运行时仿真正常继续）
# rlSyncInterval = 1  : 每帧同步（最强 on-policy 对齐，仿真速度受 Python 限制）
# rlSyncInterval = N  : 每 N 帧同步一次（权衡 on-policy 纯度与仿真速度）
# ------------------------------------------------------------------
**.nodes[*].rlSyncInterval = 0
**.nodes[*].rlSyncTimeoutSec = 5.0